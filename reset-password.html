<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEtech - Restablecer Contraseña</title>
    <link rel="stylesheet" href="style.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
</head>
<body>
    <div class="container">
        <div id="reset-form-container" class="form-container">
            <h2 style="color: #00938f; text-align: center;">Nueva Contraseña</h2>
            <p style="text-align: center; font-size: 0.9em; margin-bottom: 20px;">
                Ingresa tu nueva clave para acceder a la plataforma.
            </p>

            <form id="resetPasswordForm">
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="nueva_password" placeholder="Nueva Contraseña" required>
                    <i class="fas fa-eye toggle-password" data-target="nueva_password"></i>
                </div>

                <button type="submit" class="btn-primary" id="btn-reset">
                    Actualizar Contraseña
                </button>
            </form>
        </div>
    </div>

    <script>
        // 1. CONFIGURACIÓN: Pon la misma URL de Render que usaste en el index
        const API_BASE_URL = 'https://tu-api-en-render.onrender.com/api'; 

        // 2. CAPTURAR EL ID DESDE LA URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id'); // Extrae el ?id=... del correo

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nuevaPassword = document.getElementById('nueva_password').value;
            const btn = document.getElementById('btn-reset');
            
            if (!userId) {
                alert('❌ El enlace no es válido o ha expirado.');
                return;
            }

            btn.innerText = "Actualizando...";
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/usuarios/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        id: userId, 
                        nuevaPassword: nuevaPassword 
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    alert('✅ ¡Contraseña actualizada correctamente! Ya puedes iniciar sesión.');
                    window.location.href = 'index.html'; // Regresa al login
                } else {
                    alert('❌ Error: ' + data.msg);
                }
            } catch (err) {
                console.error(err);
                alert('No se pudo conectar con el servidor.');
            } finally {
                btn.innerText = "Actualizar Contraseña";
                btn.disabled = false;
            }
        });

        // Lógica del ojito para ver contraseña
        document.querySelector('.toggle-password').addEventListener('click', function() {
            const input = document.getElementById('nueva_password');
            if (input.type === 'password') {
                input.type = 'text';
                this.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                this.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    </script>
</body>
</html>
