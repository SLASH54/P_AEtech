<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos a AE tech</title>
    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="img/logoAEtech.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>


        /* Los estilos CSS se encuentran en el archivo login.css */

        
/* ================================================= */
/* ESTILOS PARA EL FORMULARIO DE RECUPERACIÓN AEtech */
/* ================================================= */

/* Contenedor de ícono y texto descriptivo */
#forgotForm .logo-container h3 {
    margin-bottom: 5px;
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

#forgotForm .logo-container p {
    margin-bottom: 20px;
    line-height: 1.4;
}

/* Ajuste específico para el enlace de "¿Olvidaste tu contraseña?" */
#forgot-password-link {
    transition: color 0.3s ease;
    font-weight: 500;
}

#forgot-password-link:hover {
    color: #00938f; /* Cambia al verde agua de AEtech al pasar el mouse */
    text-decoration: underline;
}

/* Estilo para el botón de enviar (Verde AEtech) */
#forgotForm button[type="submit"] {
    background-color: #00938f;
    margin-top: 10px;
    border: none;
    padding: 12px;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    transition: background 0.3s ease;
}

#forgotForm button[type="submit"]:hover {
    background-color: #007a77;
}

/* Estilo para el botón Volver (Gris neutro como el de tu imagen) */
.back-btn {
    background-color: #7d7d7d; /* Color similar al de tu botón 'Volver' actual */
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
    width: 100%;
    font-size: 0.9rem;
    transition: opacity 0.3s;
}

.back-btn:hover {
    opacity: 0.8;
}

/* Animación de entrada suave para los formularios */
#forgotForm, #loginForm, #registroForm {
    animation: fadeIn 0.4s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
    </style>
</head>
<body>
    <section id="Usuarios" class="main-content show">
    <div class="form-container">
        <div class="logo-container">
            <img src="img/logoAEtech.png" alt="imgae.jpg">
        </div>

        <!-- Pantalla de Bienvenida -->
        <div id="welcome-screen">
            <h2>Bienvenido a AEtech</h2>
            <button id="login-btn">Iniciar Sesión</button>
            <button id="register-btn">Registrarse</button>
        </div>

        <!-- Formulario de Registro (Oculto inicialmente) -->
        <form id="registroForm" style="display: none;">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
                
            </div>

            <button type="submit">Registrar</button>
            <button type="button" class="back-btn">Volver</button> <!-- Botón de Volver -->
        </form>

        <!-- Formulario de Inicio de Sesión (Añádelo aquí, oculto inicialmente) -->
        <form id="loginForm" style="display: none;">
    <div class="form-group">
        <label for="email_input">Email:</label>
        <input type="text" id="email_input" name="username" required>
    </div>
    <div class="form-group">
        <label for="password">Contraseña:</label>
        <input type="password" id="password_input" name="password" required>
       
    </div>
    <button type="submit">Iniciar Sesión</button> 

   <div class="form-group" style="text-align: center; margin-top: 10px;">
    <a href="#" id="forgot-password-link" style="color: #004b85; text-decoration: none; font-size: 0.9em;">
        ¿Olvidaste tu contraseña?
    </a>
</div>
    <button type="button" class="back-btn">Volver</button>
</form>

    </div>


        <!-- Recuperar contraseña -->

    <form id="forgotForm" style="display: none;">
    <div class="logo-container">
        <h3 style="color: #004b85;"><i class="fa-solid fa-lock-open"></i> Recuperar Acceso</h3>
        <p style="font-size: 0.9em; color: #666;">Ingresa tu correo y te enviaremos instrucciones.</p>
    </div>
    <div class="form-group">
        <label for="recovery_email">Email registrado:</label>
        <input type="email" id="recovery_email" name="recovery_email" required placeholder="ejemplo@aetech.mx">
    </div>
    <button type="submit" style="background-color: #00938f;">Enviar instrucciones</button>
    <button type="button" class="back-btn">Volver</button>
</form>

<form id="forgotForm" style="display: none;">
    <div class="logo-container">
        <h3 style="color: #004b85;"><i class="fa-solid fa-lock-open"></i> Recuperar Acceso</h3>
        <p style="font-size: 0.9em; color: #666;">Ingresa tu correo y te enviaremos instrucciones.</p>
    </div>
    <div class="form-group">
        <label for="recovery_email">Email registrado:</label>
        <input type="email" id="recovery_email" name="recovery_email" required placeholder="ejemplo@aetech.mx">
    </div>
    <button type="submit" style="background-color: #00938f;">Enviar instrucciones</button>
    <button type="button" class="back-btn">Volver</button>
</form>

    <script>

        // Función para mostrar la pantalla de bienvenida y ocultar los formularios
                function showWelcomeScreen() {
                    welcomeScreen.style.display = 'block';
                    loginForm.style.display = 'none';
                    registroForm.style.display = 'none';
                }

        document.addEventListener('DOMContentLoaded', function() {
            const loginBtn = document.getElementById('login-btn');
            const registerBtn = document.getElementById('register-btn');
            const welcomeScreen = document.getElementById('welcome-screen');    
            const registroForm = document.getElementById('registroForm'); // << ESTE
            const loginForm = document.getElementById('loginForm');     // << Y ESTE

            checkSession();
            loginForm.addEventListener('submit', loginUser); 
            registroForm.addEventListener('submit', registerUser); 

            // Mostrar/ocultar contraseña
        document.querySelectorAll('.toggle-password').forEach(icon => {
          icon.addEventListener('click', () => {
            const targetId = icon.getAttribute('data-target');
            const passwordInput = document.getElementById(targetId);
            if (passwordInput.type === 'password') {
              passwordInput.type = 'text';
              icon.classList.remove('fa-eye');
              icon.classList.add('fa-eye-slash');
            } else {
              passwordInput.type = 'password';
              icon.classList.remove('fa-eye-slash');
              icon.classList.add('fa-eye');
            }
          });
        });

            // Función para mostrar la pantalla de bienvenida y ocultar los formularios
            function showWelcomeScreen() {
                welcomeScreen.style.display = 'block';
                loginForm.style.display = 'none';
                registroForm.style.display = 'none';
            }

            loginBtn.addEventListener('click', function() {
                welcomeScreen.style.display = 'none';
                loginForm.style.display = 'block';
            });

            registerBtn.addEventListener('click', function() {
                welcomeScreen.style.display = 'none';
                registroForm.style.display = 'block';
            });

            // Agregar event listeners a los botones de "Volver"
            const backButtons = document.querySelectorAll('.back-btn');
            backButtons.forEach(button => {
                button.addEventListener('click', showWelcomeScreen);
            });
        });



        document.addEventListener('DOMContentLoaded', function() {
    // ... tus constantes actuales ...
    const forgotForm = document.getElementById('forgotForm');
    const forgotLink = document.getElementById('forgot-password-link');

    // Función para limpiar y mostrar la pantalla de bienvenida
    function showWelcomeScreen() {
        welcomeScreen.style.display = 'block';
        loginForm.style.display = 'none';
        registroForm.style.display = 'none';
        forgotForm.style.display = 'none'; // También ocultamos recuperación
    }

    // Al dar clic en "¿Olvidaste tu contraseña?"
    forgotLink.addEventListener('click', function(e) {
        e.preventDefault();
        loginForm.style.display = 'none';
        forgotForm.style.display = 'block';
    });

    // Asegúrate de que los botones "Volver" oculten el de recuperación también
    const backButtons = document.querySelectorAll('.back-btn');
    backButtons.forEach(button => {
        button.addEventListener('click', showWelcomeScreen);
    });

    // Lógica para enviar el correo (Preventiva por ahora)
    forgotForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('recovery_email').value;
        alert(`¡Listo amiko! Si el correo ${email} existe, te llegará un enlace pronto.`);
        showWelcomeScreen();
    });
});
        
    </script>

    <script src="script.js"></script>
</section>
</body>
</html>
