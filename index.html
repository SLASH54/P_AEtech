<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos a AE tech</title>
    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="img/logoAEtech.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>


        /* Los estilos CSS se encuentran en el archivo login.css */

    /* ================================================= */
/* NUEVOS ESTILOS PREMIUM PARA RECUPERACIÓN AEtech */
/* ================================================= */

/* Contenedor principal con efecto Glassmorphism (Vidrio) */
.form-container-glass {
    background: rgba(255, 255, 255, 0.1); /* Efecto transparente */
    backdrop-filter: blur(15px); /* Desenfoque Pro */
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 30px;
    width: 90%;
    max-width: 360px;
    margin: 20px auto;
    box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
    color: white; /* 👈 CLAVE: Texto blanco para que se lea */
    animation: slideUpRecover 0.3s ease-out;
}

/* Animación de entrada */
@keyframes slideUpRecover {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

/* Encabezado */
.title-aetech {
    margin: 10px 0 5px;
    color: #fff; /* Título blanco nítido */
    font-size: 1.5rem;
    font-weight: bold;
}

.description-text {
    margin: 0 0 20px;
    color: #dfdfdf; /* Gris muy claro para lectura */
    font-size: 0.9em;
    line-height: 1.4;
}

/* Ícono en círculo de gradiente (como el de tu login) */
.icon-circle {
    background: linear-gradient(135deg, #00c9c4, #00938f);
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    font-size: 1.6rem;
    color: white;
    box-shadow: 0 4px 10px rgba(0, 147, 143, 0.3);
}

/* Campos de entrada */
.form-group-aetech {
    margin-bottom: 20px;
    text-align: left;
}

.form-group-aetech label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #fff; /* Label blanco */
    margin-bottom: 5px;
    margin-left: 5px;
}

.form-group-aetech input {
    background: rgba(255, 255, 255, 0.95); /* Input blanco opaco */
    border: none;
    border-radius: 10px;
    padding: 12px 15px;
    font-size: 1rem;
    color: #333;
    width: 100%;
    transition: all 0.2s;
    outline: none;
    box-sizing: border-box; /* Para que no se desborde */
}

/* Foco del input */
.form-group-aetech input:focus {
    box-shadow: 0 0 0 3px rgba(0, 201, 196, 0.3);
}

/* Botones */
.buttons-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 20px;
}

.btn-express-save {
    background: linear-gradient(135deg, #00938f, #00c9c4);
    border: none;
    padding: 14px;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    font-size: 1rem;
}

.btn-express-save:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 147, 143, 0.3);
}

.btn-express-cancel {
    background: #7d7d7d; /* Gris de tu botón 'Volver' original */
    border: none;
    padding: 10px;
    border-radius: 10px;
    color: white;
    font-weight: 500;
    cursor: pointer;
    font-size: 0.9rem;
    transition: 0.2s;
}

.btn-express-cancel:hover {
    opacity: 0.8;
}


    </style>
</head>
<body>
    <section id="Usuarios" class="main-content show">
    <div class="form-container">
        <div class="logo-container">
            <img src="img/logoAEtech.png" alt="imgae.jpg">
        </div>

        <!-- Pantalla de Bienvenida xd inicio  -->
        <div id="welcome-screen">
            <h2>Bienvenido a AEtech</h2>
            <button id="login-btn">Iniciar Sesión</button>
            <button id="register-btn">Registrarse</button>
        </div>

        <!-- Formulario de Registro (Oculto inicialmente del proceso xd) -->
        <form id="registroForm" style="display: none;">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
                
            </div>

            <button type="submit">Registrar</button>
            <button type="button" class="back-btn">Volver</button> <!-- Botón de Volver al aparto principal -->
        </form>

        <!-- Formulario de Inicio de Sesión -->
        <form id="loginForm" style="display: none;">
    <div class="form-group">
        <label for="email_input">Email:</label>
        <input type="text" id="email_input" name="username" required>
    </div>
    <div class="form-group">
        <label for="password">Contraseña:</label>
        <input type="password" id="password_input" name="password" required>
       
    </div>
    <button type="submit">Iniciar Sesión</button> 

   <div class="form-group" style="text-align: center; margin-top: 10px;">
    <a href="#" id="forgot-password-link" style="color: #004b85; text-decoration: none; font-size: 0.9em;">
        ¿Olvidaste tu contraseña?
    </a>
</div>
    <button type="button" class="back-btn">Volver</button>
</form>

    </div>


        <!-- Recuperar contraseña -->

 <div id="forgot-form-container" class="form-container-glass" style="display: none;">
    <div class="logo-container">
        <div class="icon-circle">
            <i class="fa-solid fa-user-shield"></i>
        </div>
        <h3 class="title-aetech">Restablecer Clave</h3>
        <p class="description-text">Ingresa tu correo y tu nueva contraseña para actualizar tu acceso.</p>
    </div>

    <form id="forgotForm">
        <div class="form-group-aetech">
            <label for="recovery_email">Email registrado:</label>
            <input type="email" id="recovery_email" name="recovery_email" required placeholder="ejemplo@aetech.mx">
        </div>
        
        <div class="form-group-aetech">
            <label for="recovery_password">Nueva Contraseña:</label>
            <input type="password" id="recovery_password" name="recovery_password" required placeholder="Mínimo 6 caracteres">
        </div>

        <div class="buttons-group">
            <button type="submit" class="btn-express-save">Actualizar ahora</button>
            <button type="button" class="btn-express-cancel back-btn-recover">Volver</button>
        </div>
    </form>
</div>



    <script>

        // Función para mostrar la pantalla de bienvenida y ocultar los formularios
   document.addEventListener('DOMContentLoaded', function() {
    // === 1. CONSTANTES DE ELEMENTOS ===
    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    const welcomeScreen = document.getElementById('welcome-screen');
    const registroForm = document.getElementById('registroForm');
    const loginForm = document.getElementById('loginForm');
    
    // Elementos de Recuperación Pro
    const forgotFormContainer = document.getElementById('forgot-form-container');
    const forgotFormSub = document.getElementById('forgotForm');
    const forgotLink = document.getElementById('forgot-password-link');

    // === 2. FUNCIONES DE NAVEGACIÓN ===
    
    function showWelcomeScreen() {
        welcomeScreen.style.display = 'block';
        loginForm.style.display = 'none';
        registroForm.style.display = 'none';
        if (forgotFormContainer) forgotFormContainer.style.display = 'none';
    }

    // Mostrar Login
    if (loginBtn) {
        loginBtn.addEventListener('click', function() {
            welcomeScreen.style.display = 'none';
            loginForm.style.display = 'block';
        });
    }

    // Mostrar Registro
    if (registerBtn) {
        registerBtn.addEventListener('click', function() {
            welcomeScreen.style.display = 'none';
            registroForm.style.display = 'block';
        });
    }

    // Mostrar Recuperación (El enlace azul en el login)
    if (forgotLink) {
        forgotLink.addEventListener('click', function(e) {
            e.preventDefault();
            loginForm.style.display = 'none';
            forgotFormContainer.style.display = 'block';
        });
    }

    // Configurar todos los botones "Volver"
    const backButtons = document.querySelectorAll('.back-btn, .back-btn-recover');
    backButtons.forEach(button => {
        button.addEventListener('click', showWelcomeScreen);
    });

    // === 3. LÓGICA DE FORMULARIOS ===

    // Envío de recuperación
  // Envío de recuperación real
  if (forgotFormSub) {
    forgotFormSub.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('recovery_email').value;
        const nuevaPassword = document.getElementById('recovery_password').value; // 👈 Obtenemos la nueva clave
        
        const btn = e.target.querySelector('button[type="submit"]');
        btn.innerText = "Actualizando...";
        btn.disabled = true;

        try {
            // 🚩 Cambiamos la ruta a /quick-reset
            const res = await fetch(`${API_BASE_URL}/usuarios/quick-reset`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, nuevaPassword })
            });

            const data = await res.json();

            if (res.ok) {
                alert('✅ ¡Contraseña actualizada con éxito! Ya puedes iniciar sesión.');
                showWelcomeScreen();
            } else {
                alert(data.msg || 'Hubo un error.');
            }
        } catch (err) {
            console.error('❌ Error:', err);
            alert('No se pudo conectar con el servidor.');
        } finally {
            btn.innerText = "Actualizar ahora";
            btn.disabled = false;
        }
    });
}

    // Mostrar/Ocultar Contraseña
    document.querySelectorAll('.toggle-password').forEach(icon => {
        icon.addEventListener('click', () => {
            const targetId = icon.getAttribute('data-target');
            const passwordInput = document.getElementById(targetId);
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    });

    // Inicializar sesión y eventos existentes modelo de inicio sesion 
    if (typeof checkSession === "function") checkSession();
    if (loginForm) loginForm.addEventListener('submit', loginUser);
    if (registroForm) registroForm.addEventListener('submit', registerUser);
});

        
        
    </script>

    <script src="script.js"></script>
</section>
</body>
</html>
